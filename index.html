<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pega mosca</title>
</head>
<body>
    <aside>
        <h1 id="titulo"> Pega-mosca </h1>
        <button id="btn-iniciar"> Iniciar </button>
    </aside>

    <main>
        <h1 id="game-over">GAME OVER</h1>

        <section id="tabuleiro">
            <img src="img/mosca.png" alt="Mosca" id="mosca">
        </section>

        <section id="numeros">
            <div>
                <label for="tempo"> Tempo: </label>
                <h1 id="tempo"> 0:00 </h1>
            </div>

            <div>
                <label for="acertos"> Acertos: </label>
                <h1 id="acertos"> 0 </h1>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
